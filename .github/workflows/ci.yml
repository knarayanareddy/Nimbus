name: ClimaFi Security CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --locked
      
      - name: Cargo Audit
        run: cargo install cargo-audit && cargo audit
      
      - name: Clippy (Security Lints)
        run: cargo clippy --all-targets -- -D warnings -W clippy::all
      
      - name: Build Program
        run: anchor build
      
      - name: Run Tests
        run: anchor test

      - name: Run Property-Based Tests
        run: cargo test --test proptest_settlement -- --nocapture

  solana-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Solana Security Checks
        run: |
          echo "Running additional Solana security analysis..."
          # Future: integrate solana-verify, sealevel, etc.

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
