name: ClimaFi Security CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: programs/climafi
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cargo Audit
        run: |
          cargo install cargo-audit
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
      
      - name: Clippy (Security Lints)
        run: cargo clippy --all-targets -- -D warnings -W clippy::all
      
      - name: Build Program
        run: cargo build --release

  solana-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Solana Security Checks
        run: |
          echo "Running additional Solana security analysis..."
          # Future: integrate solana-verify, sealevel, etc.

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
