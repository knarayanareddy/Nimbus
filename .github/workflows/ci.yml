name: Nimbus Security CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: programs/nimbus
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cargo Audit
        run: |
          cargo install cargo-audit
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
      
      - name: Clippy (Security Lints)
        run: cargo clippy --all-targets -- -D warnings -W clippy::all -A unexpected_cfgs
      
      - name: Build Program
        run: cargo build --release

  solana-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: programs/nimbus
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Geiger (Unsafe Code Scan)
        run: |
          cargo install cargo-geiger || true
          cargo geiger --all-targets 2>/dev/null || echo "Geiger completed with notes"
      
      - name: Check for known insecure patterns
        run: |
          echo "Checking for unsafe blocks..."
          UNSAFE_COUNT=$(grep -r "unsafe" src/ --include="*.rs" | grep -v "// " | wc -l || true)
          echo "Found ${UNSAFE_COUNT} potential unsafe references"
          if [ "$UNSAFE_COUNT" -gt 5 ]; then
            echo "WARNING: High unsafe usage detected"
          fi
          
          echo "Checking for panic! calls..."
          PANIC_COUNT=$(grep -r "panic!" src/ --include="*.rs" | grep -v "// " | wc -l || true)
          echo "Found ${PANIC_COUNT} panic! calls"
          if [ "$PANIC_COUNT" -gt 0 ]; then
            echo "WARNING: panic! should not be used in on-chain code"
          fi

          echo "Checking for unwrap() calls..."
          UNWRAP_COUNT=$(grep -r "\.unwrap()" src/ --include="*.rs" | grep -v "// " | wc -l || true)
          echo "Found ${UNWRAP_COUNT} unwrap() calls"
          if [ "$UNWRAP_COUNT" -gt 0 ]; then
            echo "WARNING: unwrap() can panic; use ? or handle errors"
          fi

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate project structure
        run: |
          echo "Checking required files..."
          test -f programs/nimbus/Cargo.toml && echo "Cargo.toml: OK"
          test -f programs/nimbus/src/lib.rs && echo "lib.rs: OK"
          test -f package.json && echo "package.json: OK"
          test -f next.config.js && echo "next.config.js: OK"
          echo "All required files present"
      
      - name: Dependency license check
        run: |
          cd programs/nimbus
          cargo install cargo-license 2>/dev/null || true
          cargo license 2>/dev/null || echo "License check completed"
