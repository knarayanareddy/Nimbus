name: Generate SBOM

on: [push, pull_request]

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.83.0
      - name: Generate SBOM
        run: |
          cargo install cargo-sbom || true
          cd programs/climafi && cargo sbom --output-format spdx_json_2_3 > ../../sbom.json 2>/dev/null || echo '{}' > ../../sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json