name: Security Gate (OWASP A06 + A05 + A02)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 9 * * 1'   # Weekly Monday audit

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run Security Gate
        run: ./scripts/security-gate.sh
      - name: Generate Static Security Headers
        run: |
          mkdir -p out
          node scripts/generate-security-headers.js
          test -f out/_headers

  # === Semgrep (A06 + A03 + A04) ===
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: results.sarif

  # === Dedicated Secrets Scanning (A02) ===
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks (Secrets Detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog (Fallback)
        if: failure()
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
